name: Terraform

on:
  push:
    branches: [main]
    paths: ["infra/terraform/**"]
  pull_request:
    paths: ["infra/terraform/**"]

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false  # never cancel mid-apply

permissions:
  id-token: write   # OIDC token
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: infra/terraform/envs/prod
  AWS_REGION: us-east-1

jobs:
  # ── Plan: runs on every push and PR — no environment gate ───────────────────
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # Import resources that a previous partial apply created in AWS but left out
      # of Terraform state. Running before plan ensures the plan does not include
      # a "create" step for them. '|| true' makes each line idempotent: no-op
      # when the resource is already in state or does not yet exist in AWS.
      - name: Import orphaned resources
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_ecr_backend_url: ${{ secrets.ECR_BACKEND_URL }}
          TF_VAR_ecr_migrate_url: ${{ secrets.ECR_MIGRATE_URL }}
        run: |
          terraform import \
            module.compute.aws_iam_instance_profile.ec2_instance \
            taagerdash-ecs-instance 2>&1 || true

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/tf_plan.txt
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_ecr_backend_url: ${{ secrets.ECR_BACKEND_URL }}
          TF_VAR_ecr_migrate_url: ${{ secrets.ECR_MIGRATE_URL }}

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT_FILE: /tmp/tf_plan.txt
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(process.env.PLAN_OUTPUT_FILE, 'utf8');
            const body = `#### Terraform Plan\n\`\`\`\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # Upload plan so the apply job can consume it without re-planning
      - name: Upload plan artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  # ── Apply: main-push only, gated by the prod environment protection rule ────
  apply:
    name: Terraform apply
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: prod   # requires manual approval if prod has a required reviewer

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply tfplan
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_ecr_backend_url: ${{ secrets.ECR_BACKEND_URL }}
          TF_VAR_ecr_migrate_url: ${{ secrets.ECR_MIGRATE_URL }}
