name: Terraform

on:
  push:
    branches: [main]
    paths: ["infra/terraform/**"]
  pull_request:
    paths: ["infra/terraform/**"]

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false  # never cancel mid-apply

permissions:
  id-token: write   # OIDC token
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: infra/terraform/envs/prod
  AWS_REGION: us-east-1

jobs:
  terraform:
    name: Terraform plan / apply
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/tf_plan.txt
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_ecr_backend_url: ${{ secrets.ECR_BACKEND_URL }}
          TF_VAR_ecr_migrate_url: ${{ secrets.ECR_MIGRATE_URL }}

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT_FILE: /tmp/tf_plan.txt
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(process.env.PLAN_OUTPUT_FILE, 'utf8');
            const body = `#### Terraform Plan\n\`\`\`\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply tfplan
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_ecr_backend_url: ${{ secrets.ECR_BACKEND_URL }}
          TF_VAR_ecr_migrate_url: ${{ secrets.ECR_MIGRATE_URL }}
