name: Deploy

on:
  push:
    branches: [main]   # → staging automatically
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, prod]
        default: staging

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: taagerdash

jobs:
  # ── Resolve which environment to deploy ─────────────────────────────────────
  # Push to main  → staging only
  # workflow_dispatch → whichever the caller chose
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        env:
          DISPATCH_ENV: ${{ github.event.inputs.environment }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "environment=${DISPATCH_ENV}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

  # ── Build & deploy backend ──────────────────────────────────────────────────
  backend:
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}

    env:
      ENV: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build
        env:
          ECR_BACKEND_URL: ${{ secrets.ECR_BACKEND_URL }}
          GIT_SHA: ${{ github.sha }}
        run: |
          IMAGE_TAG="${ENV}-${GIT_SHA}"
          docker build \
            --tag "${ECR_BACKEND_URL}:${IMAGE_TAG}" \
            --tag "${ECR_BACKEND_URL}:${ENV}-latest" \
            backend/
          docker push "${ECR_BACKEND_URL}:${IMAGE_TAG}"
          docker push "${ECR_BACKEND_URL}:${ENV}-latest"
          echo "image=${ECR_BACKEND_URL}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Tag and push migrate image
        env:
          ECR_MIGRATE_URL: ${{ secrets.ECR_MIGRATE_URL }}
          GIT_SHA: ${{ github.sha }}
          BACKEND_IMAGE: ${{ steps.build.outputs.image }}
        run: |
          IMAGE_TAG="${ENV}-${GIT_SHA}"
          docker tag "${BACKEND_IMAGE}" "${ECR_MIGRATE_URL}:${IMAGE_TAG}"
          docker tag "${BACKEND_IMAGE}" "${ECR_MIGRATE_URL}:${ENV}-latest"
          docker push "${ECR_MIGRATE_URL}:${IMAGE_TAG}"
          docker push "${ECR_MIGRATE_URL}:${ENV}-latest"

      - name: Run database migrations
        env:
          ECR_MIGRATE_URL: ${{ secrets.ECR_MIGRATE_URL }}
          GIT_SHA: ${{ github.sha }}
        run: |
          TASK_DEF_FAMILY="taagerdash-migrate-${ENV}"
          NEW_IMAGE="${ECR_MIGRATE_URL}:${ENV}-${GIT_SHA}"

          TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_FAMILY}" \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "${TASK_DEF_JSON}" | python3 -c "import json,sys; td=json.load(sys.stdin); ni=sys.argv[1]; [c.update({'image':ni}) for c in td['containerDefinitions']]; [td.pop(k,None) for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']]; print(json.dumps(td))" "${NEW_IMAGE}")

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Wait for the EC2 container instance to register with the cluster.
          # deploy.yml and terraform.yml both trigger on main; the EC2 instance
          # can take ~2-3 min to boot and register after a fresh Terraform apply.
          echo "Waiting for ECS container instances to register..."
          for i in $(seq 1 36); do
            INSTANCE_COUNT=$(aws ecs list-container-instances \
              --cluster "${ECS_CLUSTER}" \
              --query 'length(containerInstanceArns)' \
              --output text)
            if [ "${INSTANCE_COUNT}" -gt "0" ]; then
              echo "Found ${INSTANCE_COUNT} container instance(s), proceeding."
              break
            fi
            if [ "${i}" -eq "36" ]; then
              echo "No container instances registered after 6 minutes — aborting."
              exit 1
            fi
            echo "No instances yet (attempt ${i}/36), retrying in 10s..."
            sleep 10
          done

          TASK_ARN=$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --count 1 \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: ${TASK_ARN}"
          aws ecs wait tasks-stopped \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Migration failed with exit code ${EXIT_CODE}"
            exit 1
          fi
          echo "Migrations completed"

      - name: Update ECS service
        env:
          ECR_BACKEND_URL: ${{ secrets.ECR_BACKEND_URL }}
          GIT_SHA: ${{ github.sha }}
        run: |
          TASK_DEF_FAMILY="taagerdash-backend-${ENV}"
          SERVICE_NAME="taagerdash-backend-${ENV}"
          NEW_IMAGE="${ECR_BACKEND_URL}:${ENV}-${GIT_SHA}"

          TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_FAMILY}" \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "${TASK_DEF_JSON}" | python3 -c "import json,sys; td=json.load(sys.stdin); ni=sys.argv[1]; [c.update({'image':ni}) for c in td['containerDefinitions']]; [td.pop(k,None) for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']]; print(json.dumps(td))" "${NEW_IMAGE}")

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${SERVICE_NAME}" \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${SERVICE_NAME}"

          echo "Backend deployed: ${NEW_IMAGE}"

  # ── Build & deploy frontend ─────────────────────────────────────────────────
  frontend:
    needs: [setup, backend]
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}

    env:
      ENV: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Sync to S3
        env:
          S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
        run: |
          aws s3 sync frontend/dist/assets "s3://${S3_BUCKET}/assets" \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

          aws s3 sync frontend/dist "s3://${S3_BUCKET}" \
            --exclude "assets/*" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --delete

      - name: Invalidate CloudFront
        env:
          CF_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CF_DISTRIBUTION_ID}" \
            --paths "/*"
          echo "Frontend deployed to ${CF_DISTRIBUTION_ID}"
