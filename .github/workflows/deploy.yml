name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (taagerdash)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config backend/fly.toml \
            --app taagerdash \
            --remote-only \
            --wait-timeout 180

  # ── Frontend ──────────────────────────────────────────────────────────────────
  # Cloudflare Pages auto-deploys on push to main — no step required here.
  #
  # One-time dashboard setup:
  #   Build command    : npm run build
  #   Build output dir : dist
  #   Root directory   : frontend
  #   Env var          : VITE_API_URL = https://taagerdash.fly.dev/api
